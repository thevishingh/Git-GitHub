# Git & GitHub Initial Project Documentation

## 1. Introduction

Git is a version control system used to track changes in a project’s codebase. GitHub is a cloud platform that hosts Git repositories and allows developers to collaborate, store code, and manage project versions.

This document explains the basic workflow used when starting a new project and managing code using Git and GitHub.

---

# 2. Creating a New Project

A project begins by creating a folder for the application and initializing Git inside it.

Initializing Git creates a hidden `.git` directory that stores all version history and configuration related to the project.

### Steps

1. Create a project directory.
2. Navigate into the project directory.
3. Initialize Git.

Once initialized, Git starts tracking changes made to files within the project.

---

# 3. README File

The `README.md` file is the main documentation file of the repository. It explains the purpose of the project and provides instructions for developers.

### Purpose of README

* Describe what the project does
* Explain how to install dependencies
* Provide instructions to run the project
* List project features
* Provide contribution guidelines

### Typical Sections in a README

* Project title
* Project description
* Installation instructions
* Usage instructions
* Features
* Technologies used
* Contribution guidelines

The README file appears on the homepage of the GitHub repository and is usually written in Markdown format.

---

# 4. Git Add

The `add` command is used to stage changes before committing them.

When files are modified or created, Git does not automatically include them in the next commit. Instead, the developer must select which files should be part of the commit.

### Purpose

* Prepare files to be included in the next commit
* Move changes from the working directory to the staging area

This step allows developers to control exactly which changes are saved in each version.

---

# 5. Git Commit

A commit represents a snapshot of the project at a specific point in time.

Each commit includes:

* The changes made
* The author information
* A timestamp
* A commit message describing the update

### Purpose

* Save the current state of the project
* Maintain version history
* Track progress and updates

Clear commit messages help other developers understand what changes were made and why.

---

# 6. Branch

A branch is used to create separate lines of development.

Instead of modifying the main codebase directly, developers create branches to work on features, bug fixes, or experiments.

### Benefits of Branching

* Prevents breaking the main project
* Allows multiple developers to work simultaneously
* Makes feature development isolated and organized

### Common Branch Types

| Branch         | Purpose                                |
| -------------- | -------------------------------------- |
| main / master  | Stable production-ready code           |
| feature branch | Development of new features            |
| bugfix branch  | Fixing issues in the project           |
| release branch | Preparing a new version for deployment |

Once development is complete, branches are usually merged back into the main branch.

---

# 7. Remote Repository

A remote repository is a version of the project hosted on a server, such as GitHub.

Connecting a local repository to a remote repository allows developers to:

* Share code with others
* Backup the project online
* Collaborate with teams

After linking the local repository with GitHub, developers can synchronize changes between the local system and the remote repository.

---

# 8. Push

The push operation sends local commits to the remote repository.

This uploads the latest project changes to GitHub so other team members can access them.

### Purpose

* Share updates with the team
* Backup the project online
* Maintain synchronized project versions

After pushing, the code becomes visible in the GitHub repository.

---

# 9. Basic Git Workflow

The general workflow used by developers when working with Git is:

1. Make changes to project files.
2. Stage the changes.
3. Commit the changes with a descriptive message.
4. Push the commits to the remote repository.

This process ensures that the project history remains organized and that every update is properly tracked.

---

# 10. Conclusion

Git and GitHub provide an efficient system for managing software development projects. By using version control, developers can safely track changes, collaborate with teams, and maintain a reliable project history.

A structured workflow involving README documentation, commits, branches, and remote repositories helps maintain clean and scalable project development practices.

---

# 11. Git Commands

Git provides several commands that help developers track project history, manage changes, and collaborate with other developers. These commands allow teams to maintain a structured and organized development workflow.

---
=> git log:

The git log command is used to view the history of commits in a repository. It displays a list of all commits made in the project, starting from the most recent commit to the oldest one.

Each commit entry typically includes the commit identifier, the author who made the change, the date of the commit, and the commit message describing what changes were made.

Purpose

* To review the history of project updates
* To understand when and why certain changes were made
* To track contributions from developers working on the project

Using git log helps developers analyze the development timeline and quickly identify previous versions of the project.

---

HEAD in Git:

In Git, HEAD is a reference that points to the current commit you are working on in the repository.

It represents the latest snapshot of the branch that is currently checked out When you make a new commit, Git moves the HEAD pointer to that new commit automatically.

---

Purpose of HEAD

* To indicate the current working position in the repository history
* To identify which branch or commit is currently active
* To help Git know where the next commit should be added

---

How HEAD Works

Normally, HEAD points to the latest commit of the current branch. For example, if you are working on the `main` branch, HEAD will point to the latest commit in that branch.

When a new commit is created, the branch moves forward and HEAD moves along with it.

---

Detached HEAD

Sometimes HEAD can point directly to a specific commit instead of a branch. This situation is known as a detached HEAD state.

In this state:

* You are not on any branch
* Any commits made may not belong to a branch unless a new branch is created

Detached HEAD is usually used when developers want to inspect or test an older version of the project.

---

Summary

HEAD is essentially a pointer that indicates your current position in the Git commit history. It helps Git track where changes are happening and ensures that new commits are attached to the correct branch or commit.


---

git checkout `<commit-id>`:

The git checkout `<commit-id>` command is used to move your project to a specific commit in the repository history.

After running this command, Git updates all files to match the state they were in at that commit.

Purpose

* View or test an older version of the project
* Check previous changes in the code

When using this command, Git enters a detached HEAD state, meaning you are not on a branch but directly on that commit.

---

git revert:

The git revert command is used to undo the changes introduced by a specific commit without deleting the commit history.

Instead of removing the commit, Git creates a new commit that reverses the changes made by the selected commit.

Purpose

* Safely undo changes in a project
* Keep the commit history intact while reversing a commit.

---

git reset --hard:

The git reset --hard command is used to move the current branch (HEAD) to a specific commit and discard all changes in the staging area and working directory.

After running this command, the project will return to the exact state of that commit, and any uncommitted changes will be permanently removed.

Purpose

* Completely undo commits and changes
* Reset the project to a previous clean state.

---

git status:

The git status command shows the current state of the repository.

It displays which files have been modified, staged for commit, or are untracked.

Purpose

* Check what changes have been made in the project
* See which files are ready to be committed
* Identify files that Git is not currently tracking.

--- 

Staging Multiple Files:

Staging multiple files means adding several files to the staging area at the same time so they can be included in the next commit.

The staging area is an intermediate step between the working directory and the commit history. It allows developers to choose exactly which changes should be part of the next commit.

Concept

When multiple files are modified in a project, developers may want to commit them together if they belong to the same feature, fix, or update. By staging multiple files, those related changes can be grouped into a single commit.

Purpose

* Include multiple related files in one commit
* Control what changes are committed
* Keep commit history organized and meaningful

So the concept is simply about selecting multiple files before committing them.

---

.gitignore:

The .gitignore file is used to tell Git which files or folders should not be tracked by the repository.

Sometimes a project contains files that should not be included in version control, such as temporary files, build files, environment variables, or dependency folders. The `.gitignore` file prevents these files from being added or committed to the repository.

Purpose

* Prevent unnecessary or sensitive files from being tracked
* Keep the repository clean and organized
* Avoid uploading system or build files to GitHub.

---

git branch:

The git branch command is used to create, view, or manage branches in a repository.

A branch represents a separate line of development in a project. It allows developers to work on new features, fixes, or experiments without affecting the main code.

---

Concept

In Git, the main branch (often called main or master) usually contains the stable version of the project.

When developers want to add a new feature or fix a bug, they create a new branch. All changes are made in that branch. Once the work is complete and tested, the branch can be merged back into the main branch.

This helps keep the main project stable while development continues.

---

Purpose

* Work on new features without breaking the main project
* Allow multiple developers to work on different tasks at the same time
* Keep project development organized

---

Simple Example of How It Is Used

1. The main branch contains stable code.
2. A developer creates a feature branch to add a new feature.
3. The developer works on that branch.
4. After testing, the changes are merged back into the main branch.

---

Simple Way to Understand It

Think of a branch like a copy of the project where you can safely make changes.
Once everything works correctly, those changes are added back to the main project.

---


### Creating a New Branch

There are multiple Git commands that can be used to create a new branch. All of them create a branch from the current commit, but they behave slightly differently depending on whether they also switch to the branch.

---

#### git checkout -b `<name>`

This command creates a new branch and immediately switches to it.

It combines two actions in one step:
creating the branch and making it the active branch for development.

Purpose

* Quickly create and start working on a new branch

---

#### git branch `<name>`

This command only creates a new branch, but it does not switch to it.

After creating the branch, you will still remain on the current branch until you manually switch to the new one.

Purpose

* Create a branch without changing your current working branch

---

#### git switch -c `<name>`

This command creates a new branch and switches to it, similar to `git checkout -b`.

The `git switch` command was introduced to make branch switching clearer and easier to understand compared to `git checkout`, which has multiple purposes.

Purpose

* Create and move to a new branch using a more modern Git command.

---

### Simple Understanding

* git branch → create branch only
* git checkout -b → create branch + switch
* git switch -c → create branch + switch (newer command)

---